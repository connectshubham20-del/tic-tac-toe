<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Tic <span>Tac</span> Toe</h1>

    <div class="scoreboard">
      <div class="score">
        <span class="label">X</span>
        <span class="value" id="score-x">0</span>
      </div>
      <div class="score">
        <span class="label draws">Draw</span>
        <span class="value" id="score-draw">0</span>
      </div>
      <div class="score">
        <span class="label o">O</span>
        <span class="value" id="score-o">0</span>
      </div>
    </div>

    <div class="status" id="status">Player X's turn</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <div class="buttons">
      <button id="restart-btn">New Game</button>
      <button id="reset-btn">Reset Scores</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup">
      <div class="popup-icon" id="popup-icon">🎉</div>
      <h2 id="popup-msg">Player X Wins!</h2>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
